<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Barcode Scanner</title>

  <!-- Html5Qrcode (stable) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:#f5f7fb;
      color:#222;
      padding:18px;
      display:flex;
      justify-content:center;
    }
    .container { width:100%; max-width:820px; }

    h2 { text-align:center; margin-bottom:14px; }

    /* square preview (always visible) */
    #scanner {
      width:100%;
      max-width:360px;
      height:360px;               /* square */
      margin:0 auto 12px;
      border-radius:8px;
      overflow:hidden;
      background:#000;
      border:2px solid #333;
    }

    .status { text-align:center; color:#666; margin-bottom:8px; min-height:18px; }

    /* editable barcode input */
    #barcodeOutput {
      width:100%;
      max-width:360px;
      margin:8px auto;
      display:block;
      padding:10px 12px;
      font-size:18px;
      border-radius:6px;
      border:2px solid #007bff;
      background:#fff;
      font-family: "Courier New", monospace;
    }

    #scanBtn {
      display:block;
      width:100%;
      max-width:360px;
      margin:14px auto;
      padding:12px;
      font-size:16px;
      border-radius:6px;
      background:#007bff;
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    /* product info */
    .product-info {
      max-width:720px;
      margin:18px auto 0;
      background:#fff;
      padding:14px;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }

    .product-info h3 { margin-bottom:10px; font-size:16px; color:#333; }

    /* name row: label left, value rest of the row */
    .product-row {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .product-row label {
      width:80px;
      font-size:12px;
      color:#666;
      text-transform:uppercase;
      font-weight:700;
    }
    .product-row input {
      flex:1;
      padding:10px;
      border-radius:6px;
      border:1px solid #ddd;
      background:#fafafa;
      font-size:16px;
    }

    /* second row for price & qty */
    .product-row-2 {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .product-row-2 .field { display:flex; flex-direction:column; gap:6px; }
    .product-row-2 label { font-size:12px; color:#666; text-transform:uppercase; font-weight:700; }
    .product-row-2 input { padding:10px; border-radius:6px; border:1px solid #ddd; background:#fafafa; font-size:16px; }

    /* floating settings button */
    .settings-btn {
      position:fixed;
      right:18px;
      bottom:18px;
      width:56px;
      height:56px;
      border-radius:50%;
      background:#6c757d;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      cursor:pointer;
      border:none;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .settings-btn:hover { background:#5a6268; }

    /* modal */
    .modal-backdrop {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      align-items:center;
      justify-content:center;
      z-index:1000;
    }
    .modal-backdrop.active { display:flex; }
    .modal {
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:10px;
      padding:18px;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
    }
    .modal h4 { margin-bottom:12px; }
    .modal input { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #ddd; }
    .modal .controls { display:flex; gap:10px; margin-top:12px; }
    .modal .controls button { flex:1; padding:10px; border-radius:6px; border:none; cursor:pointer; }
    .modal .controls .save { background:#28a745; color:#fff; }
    .modal .controls .cancel { background:#6c757d; color:#fff; }

    .toast {
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:86px;
      background:rgba(0,0,0,0.86);
      color:#fff;
      padding:8px 14px;
      border-radius:6px;
      font-size:14px;
      display:none;
      z-index:1100;
    }
    .toast.show { display:block; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📱 Barcode Scanner</h2>

    <div id="scanner"></div>
    <div class="status" id="status">Ready</div>

    <input id="barcodeOutput" type="text" placeholder="Scan or type barcode here..." />

    <button id="scanBtn">Start Scanning</button>

    <div class="product-info" aria-live="polite">
      <h3>Product Info</h3>

      <div class="product-row">
        <label for="productName">Name</label>
        <input id="productName" type="text" readonly />
      </div>

      <div class="product-row-2">
        <div class="field">
          <label for="productPrice">Price</label>
          <input id="productPrice" type="text" readonly />
        </div>
        <div class="field">
          <label for="productQty">Qty</label>
          <input id="productQty" type="text" readonly />
        </div>
      </div>
    </div>
  </div>

  <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>

  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal" role="document">
      <h4>Settings</h4>
      <input id="shopKey" type="text" placeholder="shop_key" />
      <input id="loginName" type="text" placeholder="login_name" />
      <input id="password" type="password" placeholder="password" />
      <div class="controls">
        <button class="save" id="saveSettingsBtn">SAVE</button>
        <button class="cancel" id="closeModalBtn">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script src="app.js"></script>
</body>
</html>
