<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barcode Scanner</title>

  <!-- Quagga2 - Most accurate open-source barcode scanner -->
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    /* Scanner container - ALWAYS VISIBLE */
    #scanner {
      width: 100%;
      max-width: 400px;
      height: 400px;
      margin: 0 auto 20px;
      border: 3px solid #333;
      border-radius: 8px;
      overflow: hidden;
      background-color: #000;
      position: relative;
    }

    #scanner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #barcodeOutput {
      font-size: 28px;
      margin: 15px 0;
      font-weight: bold;
      color: #333;
      padding: 15px;
      background-color: white;
      border-radius: 5px;
      min-height: 50px;
      border: 3px solid #007bff;
      word-wrap: break-word;
      letter-spacing: 2px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      transition: background-color 0.3s;
      font-weight: bold;
    }

    button:hover {
      background-color: #0056b3;
    }

    button:active {
      background-color: #004085;
    }

    #scanBtn {
      margin-bottom: 20px;
      padding: 15px 40px;
      font-size: 18px;
    }

    /* ⚙️ Gear button - Settings */
    #settingsBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 24px;
      padding: 12px 15px;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #6c757d;
      cursor: pointer;
    }

    #settingsBtn:hover {
      background-color: #5a6268;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    #modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #modalContent {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    #modalContent h3 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
    }

    #closeModal {
      background-color: #6c757d;
    }

    #closeModal:hover {
      background-color: #5a6268;
    }
  </style>
</head>

<body>

  <h2>📱 Barcode Scanner</h2>

  <!-- Scanner ALWAYS VISIBLE -->
  <div id="scanner"></div>

  <div id="barcodeOutput">No barcode scanned</div>

  <button id="scanBtn">Start Scanning</button>

  <!-- ⚙️ Settings Button -->
  <button id="settingsBtn">⚙️</button>

  <!-- ⚙️ Modal -->
  <div id="modal">
    <div id="modalContent">
      <h3>Settings</h3>

      <input id="shopKey" placeholder="Shop Key" />
      <input id="loginName" placeholder="Login Name" />
      <input id="password" type="password" placeholder="Password" />

      <div class="modal-buttons">
        <button id="saveSettings">Save</button>
        <button id="closeModal">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
