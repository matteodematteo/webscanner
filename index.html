<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Web Barcode Scanner</title>
  
  <!-- External Library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" async></script>

  <style>
    /* CSS Structure based on App Shell and Component constraints */
    :root {
      --radius-lg: 12px;
      --primary-color: #007bff;
    }
    body, html {
      margin: 0; padding: 0; font-family: system-ui, sans-serif;
      background: #f4f4f4;
    }
    .app-shell {
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      position: relative;
    }
    
    /* Scroll Lock States */
    body.is-scroll-locked {
      position: fixed;
      width: 100%;
    }
    #historyList.is-locked-scroll {
      max-height: 55vh;
      overflow-y: auto;
    }

    /* Camera Preview & ROI */
    #previewFrame {
      position: relative; width: 100%; background: #000; overflow: hidden;
      aspect-ratio: 16 / 9; /* Mobile will override to 1.616 via JS */
    }
    #cameraPreview { width: 100%; height: 100%; object-fit: cover; }
    #statusText {
      position: absolute; top: 10px; width: 100%; text-align: center;
      color: rgba(255, 255, 255, 0.8); z-index: 10;
    }
    #roiBox {
      position: absolute; border: 2px solid #0f0; border-radius: var(--radius-lg);
      top: 25%; left: 10%; right: 10%; bottom: 25%; z-index: 5;
    }
    #roiResizeHandle {
      position: absolute; bottom: 0; right: 0; width: 20px; height: 20px;
      background: #0f0; cursor: se-resize; border-radius: 50%;
    }
    #apiLoader {
      position: absolute; bottom: 10px; left: 10px; z-index: 10;
      width: 20px; height: 20px; border: 3px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 1s linear infinite; display: none;
      pointer-events: none;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Product Info Carousel */
    #productInfoSlider { overflow-x: hidden; scroll-snap-type: x mandatory; display: flex; }
    #productInfoTrack { display: flex; width: 300%; transition: transform 0.3s ease; }
    .pi-slide { width: 33.333%; flex-shrink: 0; scroll-snap-align: start; padding: 10px; box-sizing: border-box; }
    #productInfoDots { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: var(--primary-color); }
    .field-card { background: #f9f9f9; padding: 8px; border-radius: 4px; margin-bottom: 5px; }
    .hidden-field { display: none !important; }
    .discount-price { color: red; font-weight: bold; }

    /* History & UI */
    .history-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
    .history-actions button { border-radius: var(--radius-lg); padding: 8px; }
    #quantityPadCard { display: none; padding: 10px; background: #eee; text-align: center; }
    
    /* Floating Action Buttons */
    .fab-container-top { position: fixed; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 10px; }
    .fab-bottom { position: fixed; bottom: 20px; right: 20px; }
    .dialog-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
  </style>
</head>
<body>
  <div class="app-shell">
    
    <!-- 1. Top Toolbar -->
    <div class="toolbar">
      <input type="text" id="barcodeInput" placeholder="Manual barcode entry...">
      <button id="lookupBtn">Search</button>
    </div>

    <!-- 2. Camera Preview Pipeline -->
    <div id="previewFrame">
      <div id="statusText">Waiting for camera...</div>
      <video id="cameraPreview" playsinline autoplay muted></video>
      <div id="roiBox">
        <div id="roiResizeHandle"></div>
      </div>
      <div id="apiLoader"></div>
      <!-- Hidden host for html5-qrcode -->
      <div id="html5QrScanHost" style="display:none;"></div>
    </div>

    <!-- 3. Product Info Card (3-Slide Carousel) -->
    <div id="productInfoContainer">
      <div id="productInfoSlider">
        <div id="productInfoTrack">
          <!-- Slide 1 -->
          <div class="pi-slide">
            <div class="field-card" id="barcodeField">Barcode / Inventory</div>
            <div class="field-card" id="priceField">Price / Disc. Price / D. Price%</div>
          </div>
          <!-- Slide 2 -->
          <div class="pi-slide">
            <div class="field-card" id="supplierField">Supplier / Discount%</div>
            <div class="field-card" id="costField">Cost / Disc. Cost / Disc.+IVA</div>
          </div>
          <!-- Slide 3 -->
          <div class="pi-slide">
            <div class="field-card" id="nameField">Italian Name / Spec</div>
            <div class="field-card" id="savedField">Saved</div>
          </div>
        </div>
      </div>
      <div id="productInfoDots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <!-- Hidden Bookkeeping Fields -->
      <div id="supplier_name_compact" class="hidden-field"></div>
      <div id="id" class="hidden-field"></div>
    </div>

    <!-- 4. Quantity Keypad Card -->
    <div id="quantityPadCard">
      <input type="number" id="unlockedQuantityInput" style="display:none;">
      <div id="keypadGrid">
        <!-- Keypad buttons would be injected here -->
      </div>
    </div>

    <!-- 5. History List & Actions -->
    <div class="history-actions">
      <button id="cleanSelectedBtn">Clean Selected</button>
      <button id="cleanAllBtn">Clean All</button>
      <button id="countPill" disabled>Count: 0</button>
      <button id="printBtn">Print</button>
    </div>
    <div id="historyList"></div>

  </div>

  <!-- Floating Action Buttons -->
  <div class="fab-container-top">
    <button id="torchBtn">Torch</button>
    <button id="refreshCookieBtn">Refresh Auth</button>
    <button id="lockscreenscroll">Lock Scroll</button>
  </div>
  <button id="settingsFab" class="fab-bottom">Settings</button>

  <!-- Dialogs (Hidden by default) -->
  <div id="settingsDialog" class="dialog-modal">...</div>
  <div id="confirmDialog" class="dialog-modal">...</div>
  <div id="printDialog" class="dialog-modal">...</div>
  <div id="closestSearchDialog" class="dialog-modal">...</div>
  <div id="historyEditDialog" class="dialog-modal">...</div>

  <!-- App Logic -->
  <script src="app.js"></script>
</body>
</html>
