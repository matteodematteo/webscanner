<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 8px 0 16px;
  }
  #reader-wrap {
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  #reader {
    width: 100%;
  }
  /* Hide the library's default UI chrome we don't need */
  #reader__dashboard_section_csr button,
  #reader__filescan_input,
  #reader__camera_selection {
    display: none !important;
  }
  #result-box {
    width: 100%;
    max-width: 480px;
    margin-top: 16px;
    padding: 14px 16px;
    background: #1e1e1e;
    border-radius: 10px;
    min-height: 24px;
    font-size: 15px;
    word-break: break-all;
    border: 1px solid #333;
  }
  #status {
    font-size: 13px;
    color: #888;
    margin-top: 8px;
    text-align: center;
  }
  #result-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #4caf50;
    display: block;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>QR Code Scanner</h1>

<div id="reader-wrap">
  <div id="reader"></div>
</div>

<div id="result-box">
  <span id="result-label" style="display:none;">Last scanned</span>
  <span id="result-text">Point camera at a QR code…</span>
</div>
<div id="status">Starting camera…</div>

<script>
(function () {
  const resultText = document.getElementById("result-text");
  const resultLabel = document.getElementById("result-label");
  const statusEl = document.getElementById("status");

  // Strict, minimal-processing configuration
  const config = {
    fps: 30,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    disableFlip: false,
    videoConstraints: {
      facingMode: { exact: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: false
    }
  };

  const html5QrCode = new Html5Qrcode("reader", {
    formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ],
    verbose: false
  });

  let lastCode = null;
  let lastTime = 0;

  function onScanSuccess(decodedText) {
    const now = Date.now();
    // Basic debounce so the same code doesn't spam the UI every frame
    if (decodedText === lastCode && now - lastTime < 1500) return;
    lastCode = decodedText;
    lastTime = now;

    resultLabel.style.display = "block";
    resultText.textContent = decodedText;

    if (navigator.vibrate) navigator.vibrate(80);
  }

  function onScanFailure() {
    // Expected on almost every frame with no QR code in view — ignore silently.
  }

  function startWithConstraints(constraints) {
    return html5QrCode.start(
      constraints,
      {
        fps: config.fps,
        qrbox: config.qrbox,
        aspectRatio: config.aspectRatio,
        formatsToSupport: config.formatsToSupport,
        experimentalFeatures: config.experimentalFeatures,
        videoConstraints: config.videoConstraints
      },
      onScanSuccess,
      onScanFailure
    );
  }

  // Try exact rear camera + 720p first; fall back to "ideal" if the device
  // has no exact match (e.g. some Android devices, desktop testing).
  startWithConstraints({ facingMode: { exact: "environment" } })
    .then(() => {
      statusEl.textContent = "Scanning…";
    })
    .catch(() => {
      startWithConstraints({ facingMode: "environment" })
        .then(() => {
          statusEl.textContent = "Scanning…";
        })
        .catch((err) => {
          statusEl.textContent = "Camera error: " + err;
        });
    });

  window.addEventListener("beforeunload", () => {
    html5QrCode.stop().catch(() => {});
  });
})();
</script>

</body>
</html>
