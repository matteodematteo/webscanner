<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Barcode Scanner</title>

  <!-- Html5Qrcode (stable) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:#f5f7fb;
      color:#222;
      padding:20px;
      display:flex;
      justify-content:center;
    }
    .container { width:100%; max-width:720px; }

    h2 { text-align:center; margin-bottom:14px; }

    /* scanner preview - made smaller as requested */
    #scanner {
      width:100%;
      max-width:360px;
      height:270px;
      margin:0 auto 12px;
      border-radius:8px;
      overflow:hidden;
      background:#000;
      border:2px solid #333;
    }

    .status { text-align:center; color:#666; margin-bottom:8px; min-height:18px; }

    /* barcode input editable */
    #barcodeOutput {
      width:100%;
      max-width:360px;
      margin:8px auto;
      display:block;
      padding:10px 12px;
      font-size:18px;
      border-radius:6px;
      border:2px solid #007bff;
      background:#fff;
      font-family: "Courier New", monospace;
    }

    #scanBtn {
      display:block;
      width:100%;
      max-width:360px;
      margin:14px auto;
      padding:12px;
      font-size:16px;
      border-radius:6px;
      background:#007bff;
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    .product-info {
      max-width:720px;
      margin:18px auto 0;
      background:#fff;
      padding:14px;
      border-radius:8px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }

    .product-info h3 { margin-bottom:10px; font-size:16px; color:#333; }

    .product-field-name { margin-bottom:12px; }
    .product-field-name label { font-size:12px; color:#666; margin-bottom:6px; display:block; text-transform:uppercase; font-weight:700; }
    .product-field-name input { width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; background:#fafafa; }

    .product-fields-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .product-field label { font-size:12px; color:#666; margin-bottom:6px; display:block; text-transform:uppercase; font-weight:700; }
    .product-field input { width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; background:#fafafa; }

    /* small helpers */
    .muted { color:#777; font-size:13px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📱 Barcode Scanner</h2>

    <div id="scanner"></div>
    <div class="status" id="status">Ready</div>

    <input id="barcodeOutput" type="text" placeholder="Scan or type barcode here..." />

    <button id="scanBtn">Start Scanning</button>

    <div class="product-info" aria-live="polite">
      <h3>Product Info</h3>

      <div class="product-field-name">
        <label for="productName">Name</label>
        <input id="productName" type="text" readonly />
      </div>

      <div class="product-fields-row">
        <div class="product-field">
          <label for="productPrice">Price</label>
          <input id="productPrice" type="text" readonly />
        </div>
        <div class="product-field">
          <label for="productQty">Qty</label>
          <input id="productQty" type="text" readonly />
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
